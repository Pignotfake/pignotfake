<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Our Channel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #04071a;
    --accent: #29b6f6;
    --accent2: #0288d1;
    --glow: #29b6f655;
    --text: #e8f4fd;
    --muted: #7ca8c5;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background */
  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb-1 { width: 500px; height: 500px; background: #0288d1; top: -150px; left: -100px; animation-duration: 14s; }
  .orb-2 { width: 350px; height: 350px; background: #0a1a3a; bottom: -100px; right: -80px; animation-duration: 10s; animation-delay: -4s; }
  .orb-3 { width: 250px; height: 250px; background: #29b6f6; top: 50%; left: 60%; animation-duration: 8s; animation-delay: -2s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 40px) scale(1.08); }
  }

  /* Grid lines */
  .grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(41,182,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(41,182,246,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  /* Particles */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0;
    animation: float-up linear infinite;
  }
  @keyframes float-up {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    max-width: 520px;
    width: 90%;
    padding: 60px 48px 52px;
    background: rgba(10, 22, 48, 0.7);
    border: 1px solid rgba(41,182,246,0.18);
    border-radius: 28px;
    backdrop-filter: blur(24px);
    box-shadow: 0 0 80px rgba(41,182,246,0.08), 0 24px 60px rgba(0,0,0,0.5);
    animation: card-in 1s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Telegram icon */
  .tg-icon-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, #29b6f6, #0288d1);
    margin-bottom: 32px;
    position: relative;
    animation: icon-pulse 3s ease-in-out infinite, card-in 1s 0.1s cubic-bezier(.22,1,.36,1) both;
    box-shadow: 0 0 40px rgba(41,182,246,0.45);
  }
  .tg-icon-wrap::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1.5px solid rgba(41,182,246,0.35);
    animation: ring-expand 2.5s ease-out infinite;
  }
  @keyframes icon-pulse {
    0%,100% { box-shadow: 0 0 40px rgba(41,182,246,0.45); }
    50%      { box-shadow: 0 0 60px rgba(41,182,246,0.7); }
  }
  @keyframes ring-expand {
    0%   { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .tg-icon-wrap svg {
    width: 46px; height: 46px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
  }

  /* Badge */
  .badge {
    display: inline-block;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(41,182,246,0.1);
    border: 1px solid rgba(41,182,246,0.25);
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 18px;
    animation: card-in 1s 0.2s cubic-bezier(.22,1,.36,1) both;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 2.8rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #e8f4fd 30%, #29b6f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: card-in 1s 0.3s cubic-bezier(.22,1,.36,1) both;
  }

  p {
    font-size: 1rem;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 40px;
    font-weight: 300;
    animation: card-in 1s 0.4s cubic-bezier(.22,1,.36,1) both;
  }

  /* Stats row */
  .stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 40px;
    animation: card-in 1s 0.5s cubic-bezier(.22,1,.36,1) both;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    display: block;
  }
  .stat-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-top: 2px;
  }
  .stat-divider {
    width: 1px;
    background: rgba(41,182,246,0.18);
    align-self: stretch;
  }

  /* CTA button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 18px 40px;
    background: linear-gradient(135deg, #29b6f6, #0277bd);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-decoration: none;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 32px rgba(41,182,246,0.35);
    animation: card-in 1s 0.6s cubic-bezier(.22,1,.36,1) both;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 14px 48px rgba(41,182,246,0.5); }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: scale(0.98); }

  .btn-arrow {
    width: 22px; height: 22px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
  }
  .btn:hover .btn-arrow { transform: translateX(3px); }

  .sub-text {
    margin-top: 20px;
    font-size: 0.78rem;
    color: rgba(124,168,197,0.6);
    animation: card-in 1s 0.7s cubic-bezier(.22,1,.36,1) both;
  }
  .sub-text a { color: var(--accent); text-decoration: none; opacity: 0.8; }
  .sub-text a:hover { opacity: 1; }
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grid"></div>
<div class="particles" id="particles"></div>

<div class="card">
  <div class="tg-icon-wrap">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 4C13 4 4 13 4 24s9 20 20 20 20-9 20-20S35 4 24 4zm9.9 13.6l-3.4 16c-.2 1.1-1 1.4-1.9.8l-5.3-3.9-2.5 2.4c-.3.3-.6.4-1.1.4l.4-5.5 9.9-8.9c.4-.4-.1-.6-.7-.2L15.6 30.6l-5.2-1.6c-1.1-.3-1.1-1.1.3-1.6l19.2-7.4c.9-.4 1.7.2 1 1.6z" fill="white"/>
    </svg>
  </div>

  <div class="badge">✦ Official Channel</div>

  <h1>Join Our<br>Telegram Channel</h1>

  <p>Stay ahead with exclusive content, breaking news,<br>and updates delivered straight to you.</p>

  <div class="stats">
    <div class="stat">
      <span class="stat-num">1</span>
      <span class="stat-label">Participants</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-num">Daily</span>
      <span class="stat-label">Updates</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-num">Free</span>
      <span class="stat-label">Forever</span>
    </div>
  </div>

  <a class="btn" href="https://t.me/Pignotfake" target="_blank">
    Open in Telegram
    <span class="btn-arrow">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M1 5h8M5 1l4 4-4 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
  </a>

  <p class="sub-text">Already a member? <a href="https://t.me/Pignotfake" target="_blank">Open channel →</a></p>
</div>

<script>
  // Particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (8 + Math.random() * 14) + 's';
    p.style.animationDelay = (-Math.random() * 20) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2.5) + 'px';
    p.style.opacity = Math.random() * 0.6;
    container.appendChild(p);
  }
</script>
</body>
</html>
